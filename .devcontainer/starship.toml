"$schema" = "https://starship.rs/config-schema.json"

format = """
╭─ $directory$git_branch$git_status$golang$rust$nodejs$python$cmd_duration
╰─ $character"""

[character]
success_symbol = "[❯](bold green)"
error_symbol   = "[❯](bold red)"

[directory]
style             = "bold cyan"
truncation_length = 4
truncate_to_repo  = true

[git_branch]
symbol = "⎇  "
style  = "bold purple"
format = "[on $symbol$branch]($style) "

[git_status]
format     = '([$all_status$ahead_behind]($style) )'
style      = "bold yellow"
ahead      = "⇡${count}"
behind     = "⇣${count}"
diverged   = "⇡${ahead_count}⇣${behind_count}"
modified   = "~"
staged     = "+"
untracked  = "?"
deleted    = "✗"
conflicted = "="

[golang]
symbol = "go "
style  = "bold cyan"
format = "[$symbol$version]($style) "

[rust]
symbol = "rs "
style  = "bold red"
format = "[$symbol$version]($style) "

[nodejs]
symbol = "node "
style  = "bold green"
format = "[$symbol$version]($style) "

[python]
symbol = "py "
style  = "bold yellow"
format = "[$symbol$version]($style) "

[cmd_duration]
min_time = 2_000
format   = "[⏱ $duration](dimmed yellow) "
